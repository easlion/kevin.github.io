<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陳昱凱是gay嗎?</title>
<style>
  :root{
    --bg:#0f1620; --panel:#18222e; --line:#2a3744;
    --txt:#e8eef4; --muted:#8ba0b3; --yes:#54b4ff; --no:#f0b429;
    --accent:#54b4ff;
    --mono:"SF Mono",ui-monospace,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:radial-gradient(120% 80% at 50% 0%,#1a2737 0%,var(--bg) 60%);
    color:var(--txt); font-family:system-ui,"Noto Sans TC",sans-serif;
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:28px 16px 48px; line-height:1.6;
  }
  .wrap{width:100%;max-width:480px;}
  h1{font-size:1.4rem;font-weight:700;margin-bottom:4px;}
  .sub{color:var(--muted);font-size:.9rem;margin-bottom:24px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px;}
  .label{font-size:.8rem;color:var(--muted);margin-bottom:12px;}
  .inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .opt{padding:16px 10px;border-radius:10px;border:1px solid var(--line);
    background:transparent;color:var(--txt);font-size:.98rem;cursor:pointer;
    transition:.15s;text-align:center;}
  .opt .emoji{font-size:1.5rem;display:block;margin-bottom:4px;}
  .opt:active{transform:scale(.97);}
  .opt.sel{border-color:var(--accent);background:rgba(84,180,255,.12);color:var(--accent);font-weight:600;}
  .run{width:100%;padding:15px;border:none;border-radius:10px;background:var(--accent);
    color:#0f1620;font-size:1.02rem;font-weight:700;cursor:pointer;margin-top:4px;}
  .run:active{transform:scale(.99);}
  .trace{font-family:var(--mono);font-size:.82rem;}
  .step{padding:9px 0;border-bottom:1px solid var(--line);color:var(--muted);
    opacity:0;transform:translateY(6px);animation:show .35s forwards;}
  .step:last-child{border-bottom:none;}
  .step .k{color:var(--accent);}
  @keyframes show{to{opacity:1;transform:none;}}
  .result{text-align:center;font-size:1.4rem;font-weight:700;padding:22px;
    border-radius:12px;margin-top:4px;opacity:0;animation:show .4s .4s forwards;}
  .result .big{font-size:2.2rem;display:block;margin-bottom:6px;}
  .result.t{color:var(--yes);background:rgba(84,180,255,.1);border:1px solid rgba(84,180,255,.3);}
  .result.f{color:var(--no);background:rgba(240,180,41,.1);border:1px solid rgba(240,180,41,.3);}
  .hint{color:var(--muted);font-size:.78rem;text-align:center;margin-top:8px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>陳昱凱是gay嗎?</h1>
  <div class="card">
    <div class="label">到底是不是?</div>
    <div class="inputs">
      <button class="opt sel" data-val="rainy"><span class="emoji"></span>是<br>gay</button>
      <button class="opt" data-val="cloudy"><span class="emoji"></span>不是<br>gay</button>
    </div>
  </div>

  <button class="run" id="run">執行 ▶</button>

  <div class="card" id="out" style="display:none;margin-top:16px;">
    <div id="result"></div>
  </div>

</div>

<script>
  let weather = "rainy";

  document.querySelectorAll(".opt").forEach(b=>{
    b.addEventListener("click",()=>{
      document.querySelectorAll(".opt").forEach(x=>x.classList.remove("sel"));
      b.classList.add("sel");
      weather = b.dataset.val;
    });
  });

  document.getElementById("run").addEventListener("click",()=>{
    // 對應 C++ 邏輯：
    // bool bringUmbrella = false;
    // if (weather == "rainy" || weather == "stormy") bringUmbrella = true;
    // switch (bringUmbrella) { case true:...; case false:...; }
    let bringUmbrella = false;
    const wet = (weather === "rainy" || weather === "stormy");
    if (wet) bringUmbrella = true;

    const resBox = document.getElementById("result");
    document.getElementById("out").style.display = "block";
    resBox.innerHTML = "";

    const steps = [
      `<span class="k">bool</span> bringUmbrella = false;`,
      `weather == "rainy" || "stormy"  →  ${wet ? "true" : "false"}`,
      bringUmbrella ? `bringUmbrella 設為 <span class="k">true</span>` : `bringUmbrella 維持 <span class="k">false</span>`,
      `<span class="k">switch</span> (bringUmbrella) { ... }`
    ];

    steps.forEach((s,i)=>{
      const d = document.createElement("div");
      d.className = "step";
      d.style.animationDelay = (i*0.1)+"s";
      d.innerHTML = s;
    });

    resBox.className = "result " + (bringUmbrella ? "t" : "f");
    resBox.innerHTML = bringUmbrella
      ? `<span class="big"></span>是gay `
      : `<span class="big"></span>是gay `;
  });
</script>
</body>
</html>
